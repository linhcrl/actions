name: Test PR Changelog Check

on:
  push:
    branches:
      - pr-changelog-check-action
  workflow_dispatch:

jobs:
  test-valid-changelog:
    name: Test Valid CHANGELOG Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create valid test CHANGELOG
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to this project will be documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/).

          ## [Unreleased]

          ### Added
          - New feature

          ## [1.2.0] - 2024-03-15

          ### Added
          - Previous feature

          ## [1.1.0] - 2024-02-10

          ### Fixed
          - Bug fix
          EOF

      - name: Test action
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify outputs
        run: |
          echo "has_breaking: ${{ steps.check.outputs.has_breaking }}"

          if [[ "${{ steps.check.outputs.has_breaking }}" != "false" ]]; then
            echo "❌ Expected has_breaking=false"
            exit 1
          fi
          echo "✅ Valid changelog passed"

  test-breaking-changes-full-mode:
    name: Test Breaking Changes Detection (Full Mode)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with breaking changes
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Changed
          - Breaking Change: API restructure
          - Normal change

          ## [1.0.0] - 2024-01-01
          EOF

      - name: Test action
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          check-mode: full

      - name: Verify outputs
        run: |
          echo "has_breaking: ${{ steps.check.outputs.has_breaking }}"

          if [[ "${{ steps.check.outputs.has_breaking }}" != "true" ]]; then
            echo "❌ Expected has_breaking=true"
            exit 1
          fi
          echo "✅ Breaking changes detected correctly"

  test-no-breaking-changes:
    name: Test No Breaking Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG without breaking changes
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - New feature

          ### Fixed
          - Bug fix

          ## [1.0.0] - 2024-01-01
          EOF

      - name: Test action
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify outputs
        run: |
          if [[ "${{ steps.check.outputs.has_breaking }}" != "false" ]]; then
            echo "❌ Expected has_breaking=false"
            exit 1
          fi
          echo "✅ No breaking changes detected correctly"

  test-version-ordering-valid:
    name: Test Valid Version Ordering
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with proper version ordering
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ## [2.1.0] - 2024-03-15

          ## [2.0.0] - 2024-02-01

          ## [1.5.0] - 2024-01-20

          ## [1.2.3] - 2024-01-15

          ## [1.0.0] - 2024-01-01
          EOF

      - name: Test action
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify success
        run: echo "✅ Version ordering validated successfully"

  test-version-ordering-invalid:
    name: Test Invalid Version Ordering (Should Fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with incorrect version ordering
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ## [1.0.0] - 2024-03-15

          ## [2.0.0] - 2024-02-01

          ## [1.5.0] - 2024-01-15
          EOF

      - name: Test action (should fail)
        id: check
        continue-on-error: true
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify failure
        run: |
          if [[ "${{ steps.check.outcome }}" != "failure" ]]; then
            echo "❌ Expected action to fail with invalid version ordering"
            exit 1
          fi
          echo "✅ Invalid version ordering detected correctly"

  test-date-ordering-invalid:
    name: Test Invalid Date Ordering (Should Fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with incorrect date ordering
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ## [2.0.0] - 2024-01-15

          ## [1.0.0] - 2024-03-15
          EOF

      - name: Test action (should fail)
        id: check
        continue-on-error: true
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify failure
        run: |
          if [[ "${{ steps.check.outcome }}" != "failure" ]]; then
            echo "❌ Expected action to fail with invalid date ordering"
            exit 1
          fi
          echo "✅ Invalid date ordering detected correctly"

  test-invalid-changelog-format:
    name: Test Invalid CHANGELOG Format (Should Fail)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create invalid CHANGELOG
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # My Changelog

          This is not a valid Keep a Changelog format.

          Version 1.0.0
          - Added something
          EOF

      - name: Test action (should fail)
        id: check
        continue-on-error: true
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify failure
        run: |
          if [[ "${{ steps.check.outcome }}" != "failure" ]]; then
            echo "❌ Expected action to fail with invalid changelog format"
            exit 1
          fi
          echo "✅ Invalid changelog format detected correctly"

  test-multiple-versions-validation:
    name: Test Multiple Version Validation Depth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with multiple versions
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - Feature 1

          ## [2.0.0] - 2024-03-15

          ### Added
          - Feature 2

          ## [1.0.0] - 2024-01-15

          ### Added
          - Initial release
          EOF

      - name: Test action with validation-depth=2
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          validation-depth: '2'

      - name: Verify success
        run: echo "✅ Multiple versions validated successfully"

  test-breaking-change-indentation:
    name: Test Breaking Change with Different Indentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create CHANGELOG with indented breaking change
        run: |
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Changed
          - Breaking Change: Removed deprecated API
            - This is a sub-point
          - Normal change

          ## [1.0.0] - 2024-01-01
          EOF

      - name: Test action
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md

      - name: Verify breaking change detected
        run: |
          if [[ "${{ steps.check.outputs.has_breaking }}" != "true" ]]; then
            echo "❌ Expected has_breaking=true"
            exit 1
          fi
          echo "✅ Breaking change with indentation detected correctly"

  test-diff-mode-breaking-change:
    name: Test Diff Mode - Breaking Change in PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name "Test User"
          git config user.email "test@example.com"

      - name: Create test-base branch (simulating main)
        run: |
          git checkout -b test-base
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - Existing feature from before PR

          ## [1.0.0] - 2024-01-01

          ### Added
          - Initial release
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Base changelog"
          git push origin test-base

      - name: Create PR branch with breaking change
        run: |
          git checkout -b test-pr
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - Existing feature from before PR
          - New feature added in PR

          ### Changed
          - Breaking Change: API restructure added in PR

          ## [1.0.0] - 2024-01-01

          ### Added
          - Initial release
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Add breaking change in PR"

      - name: Test action in diff mode
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          check-mode: diff
          base-ref: test-base

      - name: Verify breaking change detected in diff only
        run: |
          echo "has_breaking: ${{ steps.check.outputs.has_breaking }}"

          if [[ "${{ steps.check.outputs.has_breaking }}" != "true" ]]; then
            echo "❌ Expected has_breaking=true (breaking change in PR diff)"
            exit 1
          fi
          echo "✅ Breaking change detected in PR diff"

  test-diff-mode-no-breaking-change:
    name: Test Diff Mode - No Breaking Change in PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name "Test User"
          git config user.email "test@example.com"

      - name: Create test-base-2 branch with breaking change
        run: |
          git checkout -b test-base-2
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Changed
          - Breaking Change: This was already in main branch

          ## [1.0.0] - 2024-01-01
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Base changelog with breaking change"
          git push origin test-base-2

      - name: Create PR branch with normal feature
        run: |
          git checkout -b test-pr-2
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - New feature added in PR (not breaking)

          ### Changed
          - Breaking Change: This was already in main branch

          ## [1.0.0] - 2024-01-01
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Add feature in PR"

      - name: Test action in diff mode
        id: check
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          check-mode: diff
          base-ref: test-base-2

      - name: Verify no breaking change in PR diff
        run: |
          echo "has_breaking: ${{ steps.check.outputs.has_breaking }}"

          if [[ "${{ steps.check.outputs.has_breaking }}" != "false" ]]; then
            echo "❌ Expected has_breaking=false (no breaking change in PR diff)"
            exit 1
          fi
          echo "✅ Correctly detected no breaking changes in PR diff (even though breaking change exists in full changelog)"

  test-diff-mode-vs-full-mode:
    name: Test Diff Mode vs Full Mode Comparison
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup git config
        run: |
          git config user.name "Test User"
          git config user.email "test@example.com"

      - name: Create test-base-3 branch with breaking change
        run: |
          git checkout -b test-base-3
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Changed
          - Breaking Change: Already existed before PR

          ## [1.0.0] - 2024-01-01
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Base changelog"
          git push origin test-base-3

      - name: Create PR branch with feature
        run: |
          git checkout -b test-pr-3
          cat > TEST_CHANGELOG.md << 'EOF'
          # Changelog

          ## [Unreleased]

          ### Added
          - New feature in PR

          ### Changed
          - Breaking Change: Already existed before PR

          ## [1.0.0] - 2024-01-01
          EOF
          git add TEST_CHANGELOG.md
          git commit -m "Add feature"

      - name: Test action in FULL mode
        id: check-full
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          check-mode: full

      - name: Test action in DIFF mode
        id: check-diff
        uses: ./pr-changelog-check
        with:
          changelog-path: TEST_CHANGELOG.md
          check-mode: diff
          base-ref: test-base-3

      - name: Verify different results for full vs diff mode
        run: |
          echo "Full mode has_breaking: ${{ steps.check-full.outputs.has_breaking }}"
          echo "Diff mode has_breaking: ${{ steps.check-diff.outputs.has_breaking }}"

          if [[ "${{ steps.check-full.outputs.has_breaking }}" != "true" ]]; then
            echo "❌ Expected full mode to detect breaking change"
            exit 1
          fi

          if [[ "${{ steps.check-diff.outputs.has_breaking }}" != "false" ]]; then
            echo "❌ Expected diff mode to NOT detect breaking change (it was already in base)"
            exit 1
          fi

          echo "✅ Full mode detected breaking change, diff mode did not - correct behavior!"
